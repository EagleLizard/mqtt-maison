
services:
  mqtt:
    container_name: mqtt_maison
    restart: unless-stopped
    build: .
    stop_grace_period: 1s
    environment:
      - mqtt_server_uri=${mqtt_server_uri}
      - mqtt_user=${mqtt_user}
      - mqtt_password=${mqtt_password}
      - ENVIRONMENT=${ENVIRONMENT}
      - sun_latitude=${sun_latitude}
      - sun_longitude=${sun_longitude}
      - sun_elevation_ft=${sun_elevation_ft}
    volumes:
      - ./logs_:/home/ezd/app/logs
      - ./data:/home/ezd/app/data
    logging:
      driver: "local"
      options:
        max-size: 32m

